# Everything runs in Docker if you want it to:
#
#   docker compose run --rm dev            # interactive dev shell (repo at /ws)
#   docker compose up sil                  # headless SIL simulation
#   docker compose exec sil ros2 topic pub --once /goal_pose \
#       geometry_msgs/msg/PoseStamped '{pose: {position: {x: 2.0, y: -1.0}}}'
services:
  dev:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: dev
    image: ars-dev
    volumes:
      - .:/ws
    working_dir: /ws
    stdin_open: true
    tty: true

  sil:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: sil
    image: ars-sil
