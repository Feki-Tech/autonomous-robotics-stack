# ros_gz_bridge topic map for the SIL pipeline (world "depot", model
# "ars_bot"). Velocity commands flow into Gazebo; joint states and the sim
# clock flow out. Odometry is deliberately NOT bridged: the stack estimates
# its own pose from joint states (see ADR-0002).
- ros_topic_name: cmd_vel
  gz_topic_name: cmd_vel
  ros_type_name: geometry_msgs/msg/Twist
  gz_type_name: gz.msgs.Twist
  direction: ROS_TO_GZ

- ros_topic_name: joint_states
  gz_topic_name: /world/depot/model/ars_bot/joint_state
  ros_type_name: sensor_msgs/msg/JointState
  gz_type_name: gz.msgs.Model
  direction: GZ_TO_ROS

- ros_topic_name: clock
  gz_topic_name: /clock
  ros_type_name: rosgraph_msgs/msg/Clock
  gz_type_name: gz.msgs.Clock
  direction: GZ_TO_ROS
